# ---------------
# Node Metrics Collection Agent
#   Scrapes host/container metrics and forwards them to an upstream edge relay.
#
# ---------------
# Config (paste into portainer advance env text input):
#
# <config_start>
#   #@ Placement
#   #-    Configure a placement constraint to where the container will be run.
#   #-    Examples:
#   #-        - node.hostname==<hostname>
#   #-        - engine.labels.fs-access.<worker-hostname>.mnt==true
#   #-        - node.role!=manager
#   PROM_AGENT_PLACEMENT_CONSTRAINT=engine.labels.node-type==swarm-monitor
#   NODE_EXPORTER_PLACEMENT_CONSTRAINT=node.platform.os==linux
#   #@ Host Config
#   #-  - TZ -
#   #-    The timezone.
#   TZ=Etc/UTC
#   #-  - NODE_CLUSTER -
#   #-    Optional cluster label attached to metrics when external labels
#   #-    are not explicitly overridden.
#   NODE_CLUSTER=default
#   #@ Storage
#   #-  - PROM_AGENT_REMOTE_WRITE_MAX_DISK_USAGE -
#   #-    Max on-disk queue size per remote_write URL, e.g. 1GB or 500MiB
#   PROM_AGENT_REMOTE_WRITE_MAX_DISK_USAGE=1GB
#   #@ Scrape Config
#   #-  - PROM_AGENT_SCRAPE_INTERVAL -
#   #-    Scrape interval for node-exporter
#   PROM_AGENT_SCRAPE_INTERVAL=15s
#   #-  - PROM_AGENT_EVAL_INTERVAL -
#   #-    Evaluation interval for rules
#   PROM_AGENT_EVAL_INTERVAL=15s
#   #-  - PROM_AGENT_EXTERNAL_LABELS -
#   #-    External labels block (indented 4 spaces), e.g.:
#   #-      edge: "vps-1"
#   PROM_AGENT_EXTERNAL_LABELS=
#   #-  - PROM_AGENT_ADDITIONAL_SCRAPE_CONFIGS -
#   #-    Additional scrape_configs entries (indented 2 spaces)
#   PROM_AGENT_ADDITIONAL_SCRAPE_CONFIGS=
#   #@ Remote Write (Edge Relay)
#   #-  - EDGE_REMOTE_WRITE_URL -
#   #-    Edge relay remote_write URL, e.g.:
#   #-      https://edge.example.com/api/v1/write
#   EDGE_REMOTE_WRITE_URL=
#   #-  - EDGE_REMOTE_WRITE_BASIC_AUTH_USER -
#   #-    Optional username for edge relay basic auth
#   EDGE_REMOTE_WRITE_BASIC_AUTH_USER=
#   #-  - EDGE_REMOTE_WRITE_BASIC_AUTH_PASS -
#   #-    Optional password for edge relay basic auth
#   EDGE_REMOTE_WRITE_BASIC_AUTH_PASS=
# <config_end>
#
---
networks:
  node-metrics-collection-net:
    driver: overlay
    attachable: true
volumes:
  node-agent-data:
    name: node-metrics-collection-agent-data

services:
  vmagent:
    image: victoriametrics/vmagent:v1.146.0 #>convert_sha256
    user: '65534:65534'
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        window: 5s
      placement:
        constraints:
          - ${PROM_AGENT_PLACEMENT_CONSTRAINT:-engine.labels.node-type==swarm-monitor}
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ['CMD', '/bin/sh', '-c', 'kill -0 1']
      interval: 15s
      timeout: 10s
      retries: 5
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        if [ -z "$${EDGE_REMOTE_WRITE_URL:-}" ]; then
          echo "EDGE_REMOTE_WRITE_URL is required"
          exit 1
        fi

        mkdir -p /etc/vmagent

        cat > /etc/vmagent/prometheus.yml <<EOF
        global:
          scrape_interval: $${PROM_AGENT_SCRAPE_INTERVAL:-15s}
          evaluation_interval: $${PROM_AGENT_EVAL_INTERVAL:-15s}
        EOF

        if [ -n "$${PROM_AGENT_EXTERNAL_LABELS:-}" ]; then
          echo "  external_labels:" >> /etc/vmagent/prometheus.yml
          printf "%s\n" "$${PROM_AGENT_EXTERNAL_LABELS}" >> /etc/vmagent/prometheus.yml
        else
          echo "  external_labels:" >> /etc/vmagent/prometheus.yml
          echo "    node_id: \"$${NODE_ID}\"" >> /etc/vmagent/prometheus.yml
          echo "    node_name: \"$${NODE_NAME}\"" >> /etc/vmagent/prometheus.yml
          echo "    node_cluster: \"$${NODE_CLUSTER:-default}\"" >> /etc/vmagent/prometheus.yml
        fi

        cat >> /etc/vmagent/prometheus.yml <<EOF
        scrape_configs:
          - job_name: node-exporter
            dns_sd_configs:
            - names:
              - 'tasks.node-exporter'
              type: 'A'
              port: 9100
              refresh_interval: 60s
          - job_name: cadvisor
            dns_sd_configs:
            - names:
              - 'tasks.cadvisor'
              type: 'A'
              port: 8080
              refresh_interval: 60s
          - job_name: vmagent
            static_configs:
              - targets: ["localhost:8429"]
        EOF

        if [ -n "$${PROM_AGENT_ADDITIONAL_SCRAPE_CONFIGS:-}" ]; then
          printf "%s\n" "$${PROM_AGENT_ADDITIONAL_SCRAPE_CONFIGS}" >> /etc/vmagent/prometheus.yml
        fi

        VMAGENT_REMOTE_WRITE_BASIC_AUTH_ARGS=""
        if [ -n "$${EDGE_REMOTE_WRITE_BASIC_AUTH_USER:-}" ] && [ -n "$${EDGE_REMOTE_WRITE_BASIC_AUTH_PASS:-}" ]; then
          VMAGENT_REMOTE_WRITE_BASIC_AUTH_ARGS=" \
          -remoteWrite.basicAuth.username=$${EDGE_REMOTE_WRITE_BASIC_AUTH_USER} \
          -remoteWrite.basicAuth.password=$${EDGE_REMOTE_WRITE_BASIC_AUTH_PASS}"
        fi

        VMAGENT_REMOTE_WRITE_MAX_DISK_USAGE_ARGS=""
        if [ -n "$${PROM_AGENT_REMOTE_WRITE_MAX_DISK_USAGE:-}" ]; then
          VMAGENT_REMOTE_WRITE_MAX_DISK_USAGE_ARGS=" -remoteWrite.maxDiskUsagePerURL=$${PROM_AGENT_REMOTE_WRITE_MAX_DISK_USAGE}"
        fi

        exec /vmagent-prod \
          -promscrape.config=/etc/vmagent/prometheus.yml \
          -remoteWrite.url=$${EDGE_REMOTE_WRITE_URL} \
          -remoteWrite.tmpDataPath=/vmagent-remotewrite-data \
          -httpListenAddr=:8429 \
          $${VMAGENT_REMOTE_WRITE_BASIC_AUTH_ARGS} \
          $${VMAGENT_REMOTE_WRITE_MAX_DISK_USAGE_ARGS}

    # NETWORK:
    networks:
      - node-metrics-collection-net
    # ENVIRONMENT:
    environment:
      TZ: ${TZ:-Etc/UTC}
      NODE_ID: '{{.Node.ID}}'
      NODE_NAME: '{{.Node.Hostname}}'
      NODE_CLUSTER: ${NODE_CLUSTER:-default}
      PROM_AGENT_REMOTE_WRITE_MAX_DISK_USAGE: ${PROM_AGENT_REMOTE_WRITE_MAX_DISK_USAGE:-1GB}
      PROM_AGENT_SCRAPE_INTERVAL: ${PROM_AGENT_SCRAPE_INTERVAL:-15s}
      PROM_AGENT_EVAL_INTERVAL: ${PROM_AGENT_EVAL_INTERVAL:-15s}
      PROM_AGENT_EXTERNAL_LABELS: ${PROM_AGENT_EXTERNAL_LABELS:-}
      PROM_AGENT_ADDITIONAL_SCRAPE_CONFIGS: ${PROM_AGENT_ADDITIONAL_SCRAPE_CONFIGS:-}
      EDGE_REMOTE_WRITE_URL: ${EDGE_REMOTE_WRITE_URL:?}
      EDGE_REMOTE_WRITE_BASIC_AUTH_USER: ${EDGE_REMOTE_WRITE_BASIC_AUTH_USER:-}
      EDGE_REMOTE_WRITE_BASIC_AUTH_PASS: ${EDGE_REMOTE_WRITE_BASIC_AUTH_PASS:-}

    # VOLUMES:
    volumes:
      - type: volume
        source: node-agent-data
        target: /vmagent-remotewrite-data

  # -- Node exporter --
  #
  # Prometheus exporter for hardware and OS metrics exposed by *NIX kernels.
  #
  node-exporter:
    # Releases: https://hub.docker.com/r/prom/node-exporter/tags
    image: prom/node-exporter:v1.11.1 #>convert_sha256
    deploy:
      mode: global
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
      placement:
        constraints:
          - ${NODE_EXPORTER_PLACEMENT_CONSTRAINT:-node.platform.os==linux}
    entrypoint:
      - '/bin/sh'
      - '-c'
      - |
        set -e

        echo "Setting configuration..."
        NODE_NAME=$$(cat /etc/nodename)
        NODE_ID=$${NODE_ID:-$${NODE_NAME}}
        mkdir -p /tmp/node-exporter
        echo "node_meta{node_id=\"$$NODE_ID\", node_name=\"$$NODE_NAME\"} 1" > /tmp/node-exporter/node-meta.prom
        echo

        echo "### Running node-exporter ###"
        echo "/bin/node_exporter $${@}"
        exec /bin/node_exporter $${@}
    command:
      - '--no-collector.ipvs'
      - '--path.rootfs=/rootfs'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.textfile.directory=/tmp/node-exporter/'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+|run/credentials/.+)($$|/)'

    # NETWORK:
    networks:
      - node-metrics-collection-net

    # ENVIRONMENT:
    environment:
      - NODE_ID={{.Node.ID}}

    # VOLUMES:
    volumes:
      - type: bind
        source: /
        target: /rootfs
        read_only: true
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
      - type: bind
        source: /etc/hostname
        target: /etc/nodename
        read_only: true

  # -- cAdvisor (Container Advisor)  --
  #
  # Provides container users an understanding of the resource usage and performance characteristics of their
  # running containers.
  #
  cadvisor:
    # cAdvisor Releases: https://github.com/google/cadvisor/pkgs/container/cadvisor/versions?filters%5Bversion_type%5D=tagged
    image: ghcr.io/google/cadvisor:v0.60.3 #>convert_sha256
    command:
      - -logtostderr
      - -docker_only
      - -housekeeping_interval=15s
      - -max_housekeeping_interval=60s
      - -allow_dynamic_housekeeping=true
    deploy:
      mode: global
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
      placement:
        constraints:
          - node.platform.os == linux

    # NETWORK:
    networks:
      - node-metrics-collection-net

    # VOLUMES:
    volumes:
      - type: bind
        source: /
        target: /rootfs
        read_only: true
      - type: bind
        source: /var/run
        target: /var/run
        read_only: true
      - type: bind
        source: /sys
        target: /sys
        read_only: true
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
        read_only: true
      - type: bind
        source: /dev
        target: /dev
        read_only: true
